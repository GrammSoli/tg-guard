services:
  # ── Nginx — reverse proxy + static frontend ──────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend build — one-shot, copies dist to volume ─
  frontend-build:
    build: ./frontend
    volumes:
      - frontend_dist:/output
    entrypoint: ["sh", "-c", "cp -r /app/dist/* /output/ && echo 'Frontend copied.'"]

  # ── Go backend ───────────────────────────────────────
  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Postgres backup sidecar ──────────────────────────
  # prodrigestivill/postgres-backup-local runs pg_dump on a cron-style
  # schedule, gzips the output, and applies a tiered retention policy
  # (KEEP_DAYS / KEEP_WEEKS / KEEP_MONTHS). Backups land in a host-
  # mounted directory so the operator can rsync them off-box.
  #
  # Why a sidecar over a host cron: keeping the dump process in the same
  # compose project means it follows the compose lifecycle (down --
  # rmi stops backups too, not a stray cron) and doesn't depend on the
  # host having pg_dump installed at the matching Postgres major.
  #
  # KEEP_MINS is set so a fresh deploy that doesn't yet have daily
  # rotation still produces a recent snapshot within the first hour.
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    # The image's /init.sh entry point needs root to chown the
    # /backups mount to the internal postgres user before su'ing to
    # it for the actual pg_dump. Forcing `user: postgres:postgres`
    # from the outside skips that chown and lands us at "BACKUP_DIR
    # points to a file or folder with insufficient permissions."
    # Trade-off: the schedule loop runs as root inside the container,
    # but the dump itself runs as postgres internally.
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
      # Default: dump at 03:30 server time. Override via BACKUP_SCHEDULE
      # env var on the host if a different window is needed (e.g. an
      # off-peak slot that doesn't overlap traffic from US time zones).
      SCHEDULE: ${BACKUP_SCHEDULE:-30 3 * * *}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      # Bound dump duration so a long-running dump on an overloaded DB
      # can't pile up with the next scheduled one.
      POSTGRES_CLUSTER: "FALSE"
      HEALTHCHECK_PORT: 8080

volumes:
  pgdata:
  redisdata:
  frontend_dist:
