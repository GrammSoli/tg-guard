server {
    listen 80;
    server_name app.subguard.click;

    # ── Frontend SPA ──────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ─────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Telegram webhook proxy ────────────────────────
    location /webhook {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Health check (ops convenience) ────────────────
    # /health returns {status, db, redis} as strings — no sensitive
    # info — so it's safe to expose for uptime monitoring
    # (UptimeRobot, Better Stack, etc.). access_log off keeps a
    # 1Hz probe from drowning the request log.
    location = /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── /metrics is intentionally NOT proxied here ────
    # Prometheus should scrape backend:3000/metrics directly inside
    # the Docker network (or via a sidecar). Exposing /metrics via
    # nginx without the METRICS_BEARER env set would leak full
    # process internals — handler latencies, DB pool state, all
    # users-touched HTTP paths — to anyone with curl access to the
    # public domain.

    # ── Security headers ──────────────────────────────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        "ALLOW-FROM https://web.telegram.org" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_min_length 256;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/wasm;

    # ── Static asset caching ──────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
